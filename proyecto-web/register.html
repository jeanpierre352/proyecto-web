<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODA PERÚ - Crear Cuenta</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇵🇪</text></svg>">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css">
    <script id="tailwind-config" defer>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        "label-caps": ["Calibri", "sans-serif"],
                        "headline-lg": ["Calibri", "sans-serif"],
                        "body-md": ["Calibri", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="font-body-md text-gray-900 dark:text-gray-100 bg-white dark:bg-black transition-colors duration-300">
    <!-- Header -->
    <header class="bg-white dark:bg-black border-b border-gray-200 dark:border-gray-800 fixed top-0 z-50 w-full">
        <nav class="flex justify-between items-center h-20 px-8 max-w-7xl mx-auto w-full">
            <div class="flex items-center gap-12">
                <a href="home.html" class="text-2xl font-bold tracking-tighter text-black dark:text-white">MODA PERÚ</a>
                <div class="hidden md:flex gap-8 items-center">
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="home.html">Colección</a>
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="novedades.html">Novedades</a>
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="hombre.html">Hombre</a>
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="mujer.html">Mujer</a>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div id="userMenu" class="hidden flex items-center gap-4">
                    <a id="userEmail" href="profile.html" class="text-xs text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white"></a>
                    <button onclick="logout()" class="text-xs text-gray-400 dark:text-gray-500 hover:text-black dark:hover:text-white">Cerrar</button>
                </div>
                <button id="loginBtn" class="icon-btn dark:text-white" onclick="goToLogin()">
                    <span class="material-symbols-outlined" data-icon="person">person</span>
                </button>
                <button class="icon-btn relative dark:text-white" onclick="window.location.href='cart.html'">
                    <span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
                </button>
                <button class="icon-btn dark:text-white" onclick="toggleDarkMode()">
                    <span id="themeIcon" class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="pt-32 pb-20 max-w-7xl mx-auto px-8">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white dark:bg-black p-8 rounded-lg border border-gray-200 dark:border-gray-800">
                <h1 class="headline-lg text-black dark:text-white mb-8 text-center">Crear Cuenta</h1>
                
                <form onsubmit="handleRegister(event)">
                    <div class="mb-6">
                        <label class="block label-caps text-gray-500 dark:text-gray-400 mb-2">Nombre completo</label>
                        <input type="text" id="registerName" class="form-input" placeholder="Tu nombre" required>
                    </div>
                    <div class="mb-6">
                        <label class="block label-caps text-gray-500 dark:text-gray-400 mb-2">Correo Electrónico</label>
                        <input type="email" id="registerEmail" class="form-input" placeholder="nombre@ejemplo.com" required>
                    </div>
                    <div class="mb-6">
                        <label class="block label-caps text-gray-500 dark:text-gray-400 mb-2">Contraseña</label>
                        <input type="password" id="registerPassword" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    <div class="mb-6">
                        <label class="block label-caps text-gray-500 dark:text-gray-400 mb-2">Confirmar Contraseña</label>
                        <input type="password" id="registerConfirm" class="form-input" placeholder="Repite tu contraseña" required>
                    </div>
                    <button type="submit" class="btn-primary w-full">Crear Cuenta</button>
                </form>
                
                <p class="mt-6 text-sm text-gray-500 dark:text-gray-400 text-center">
                    ¿Ya tienes cuenta? 
                    <a href="index.html" class="text-black dark:text-white font-semibold underline hover:opacity-80">Inicia sesión</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="infoModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 max-w-lg w-full p-8 rounded-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-xl font-bold text-black dark:text-white">Título</h2>
                <button onclick="closeModal()" class="text-2xl dark:text-white">✕</button>
            </div>
            <div id="modalContent" class="text-gray-700 dark:text-gray-300"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white dark:bg-black border-t border-gray-200 dark:border-gray-800 w-full mt-20">
        <div class="flex flex-col md:flex-row justify-between items-center py-12 px-8 max-w-7xl mx-auto gap-6">
            <div class="text-lg font-black text-black dark:text-white uppercase">MODA PERÚ</div>
            <div class="flex flex-wrap justify-center gap-6">
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('sostenibilidad')">Sostenibilidad</a>
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('terminos')">Términos</a>
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('envios')">Envíos</a>
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('devoluciones')">Devoluciones</a>
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('tallas')">Guía de Tallas</a>
            </div>
            <div class="text-[10px] tracking-widest uppercase text-gray-500 dark:text-gray-500">© 2024 MODA PERÚ. LIMA, PERÚ.</div>
        </div>
    </footer>

    <script>
        // Theme Management
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.textContent = 'dark_mode';
                localStorage.setItem('modaPeruTheme', 'light');
            } else {
                html.classList.add('dark');
                icon.textContent = 'light_mode';
                localStorage.setItem('modaPeruTheme', 'dark');
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem('modaPeruTheme') || 'light';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                const icon = document.getElementById('themeIcon');
                if (icon) icon.textContent = 'light_mode';
            }
        }

        // User Management
        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('modaPeruCurrentUser') || 'null');
        }

        function setCurrentUser(user) {
            localStorage.setItem('modaPeruCurrentUser', JSON.stringify(user));
        }

        function updateUserMenu() {
            const user = getCurrentUser();
            const userMenu = document.getElementById('userMenu');
            const loginBtn = document.getElementById('loginBtn');
            const userEmail = document.getElementById('userEmail');
            if (user) {
                userMenu.classList.remove('hidden');
                loginBtn.classList.add('hidden');
                if (userEmail) userEmail.textContent = user.name || user.email;
            } else {
                userMenu.classList.add('hidden');
                loginBtn.classList.remove('hidden');
            }
        }

        function goToLogin() {
            const user = getCurrentUser();
            window.location.href = user ? 'profile.html' : 'index.html';
        }

        function logout() {
            localStorage.removeItem('modaPeruCurrentUser');
            updateUserMenu();
            window.location.href = 'index.html';
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('modaPeruCart') || '[]');
            const badge = document.getElementById('cartBadge');
            if (badge) {
                if (cart.length > 0) {
                    badge.textContent = cart.length;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }

        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Modal Data
        const modalData = {
            sostenibilidad: {
                title: 'Sostenibilidad',
                content: `<p>MODA PERÚ está comprometido con la sostenibilidad y el comercio ético.</p>
                <h3 class="font-bold text-black dark:text-white mt-4">Nuestra Compromisión</h3>
                <ul class="list-disc pl-5 space-y-2 mt-2">
                    <li>Fibras 100% naturales y renovables</li>
                    <li>Comunidades artesanas del sur del Perú</li>
                    <li>Proceso de producción sostenible</li>
                    <li>Embalajes reciclados</li>
                    <li>Reducción de huella de carbono</li>
                </ul>
                <p class="mt-4">Cada compra apoya a más de 500 familias artesanas.</p>`
            },
            terminos: {
                title: 'Términos y Condiciones',
                content: `<h3 class="font-bold text-black dark:text-white">1. General</h3>
                <p class="mt-2">MODA PERÚ es una tienda online de moda que opera desde Lima, Perú.</p>
                <h3 class="font-bold text-black dark:text-white mt-4">2. Precios</h3>
                <p class="mt-2">Todos los precios incluyen IGV (18%). Nos reservamos el derecho de modificar precios sin previo aviso.</p>
                <h3 class="font-bold text-black dark:text-white mt-4">3. Stock</h3>
                <p class="mt-2">Los productos están sujetos a disponibilidad. Si un producto no está disponible, te contactaremos para un reembolso.</p>
                <h3 class="font-bold text-black dark:text-white mt-4">4. Garantía</h3>
                <p class="mt-2">Todos nuestros productos tienen garantía de calidad por 6 meses.</p>`
            },
            envios: {
                title: 'Envíos',
                content: `<h3 class="font-bold text-black dark:text-white">Métodos de Envío</h3>
                <ul class="list-disc pl-5 space-y-2 mt-2">
                    <li><strong>Lima:</strong> 24-48 horas - S/ 15</li>
                    <li><strong>Provincias:</strong> 3-5 días - S/ 25</li>
                    <li><strong>Gratis:</strong> Pedidos mayores a S/ 500</li>
                </ul>
                <h3 class="font-bold text-black dark:text-white mt-4">Información Importante</h3>
                <p class="mt-2">Los envíos se procesan de lunes a viernes. Pedidos viernes después de 2pm se envían lunes.</p>`
            },
            devoluciones: {
                title: 'Devoluciones',
                content: `<h3 class="font-bold text-black dark:text-white">Política de Devoluciones</h3>
                <ul class="list-disc pl-5 space-y-2 mt-2">
                    <li>Tienes 30 días para solicitar un cambio</li>
                    <li>El producto debe estar sin usar</li>
                    <li>Debe tener las etiquetas originales</li>
                    <li>El cliente paga el envío de retorno</li>
                </ul>
                <h3 class="font-bold text-black dark:text-white mt-4">Proceso</h3>
                <p class="mt-2">Contáctanos por WhatsApp o email para iniciar el proceso.</p>`
            },
            tallas: {
                title: 'Guía de Tallas',
                content: `<h3 class="font-bold text-black dark:text-white">Tabla de Tallas</h3>
                <table class="w-full mt-4 border-collapse">
                    <thead>
                        <tr class="border-b border-gray-300 dark:border-gray-700">
                            <th class="text-left py-2 text-black dark:text-white">Talla</th>
                            <th class="text-left py-2 text-black dark:text-white">Medida</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">XS</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 80-86cm</td>
                        </tr>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">S</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 86-92cm</td>
                        </tr>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">M</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 92-98cm</td>
                        </tr>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">L</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 98-104cm</td>
                        </tr>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">XL</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 104-110cm</td>
                        </tr>
                    </tbody>
                </table>
                <p class="mt-4 text-gray-600 dark:text-gray-400">¿Necesitas ayuda? Contáctanos por WhatsApp.</p>`
            }
        };

        function showModal(page) {
            const data = modalData[page];
            if (data) {
                const modalTitle = document.getElementById('modalTitle');
                const modalContent = document.getElementById('modalContent');
                if (modalTitle) modalTitle.textContent = data.title;
                if (modalContent) modalContent.innerHTML = data.content;
                const modal = document.getElementById('infoModal');
                if (modal) modal.classList.remove('hidden');
            }
        }

        function closeModal() {
            const modal = document.getElementById('infoModal');
            if (modal) modal.classList.add('hidden');
        }

        // Auth Handlers
        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;

            if (password !== confirm) {
                showToast('Las contraseñas no coinciden', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('modaPeruUsers') || '[]');
            if (users.find(u => u.email === email)) {
                showToast('Ya existe una cuenta con este correo', 'error');
                return;
            }

            const newUser = { name, email, password };
            users.push(newUser);
            localStorage.setItem('modaPeruUsers', JSON.stringify(users));
            setCurrentUser({ name, email });
            showToast('Cuenta creada exitosamente', 'success');
            
            // Redirect to home after successful registration
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        }

        // Initialize
        window.onload = function() {
            loadTheme();
            updateUserMenu();
            updateCartBadge();
            const user = getCurrentUser();
            if (user) {
                window.location.href = 'home.html';
            }
        };
    </script>
</body>
</html>
