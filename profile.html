<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODA PERÚ - Mi Perfil</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇵🇪</text></svg>">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        "label-caps": ["Calibri", "sans-serif"],
                        "headline-lg": ["Calibri", "sans-serif"],
                        "body-md": ["Calibri", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
 <body class="font-body-md text-gray-900 dark:text-gray-100 bg-white dark:bg-black transition-colors duration-300">

    <!-- Modal -->
    <div id="infoModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 max-w-lg w-full p-8 rounded-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-xl font-bold text-black dark:text-white">Título</h2>
                <button onclick="closeModal()" class="text-2xl dark:text-white">✕</button>
            </div>
            <div id="modalContent" class="text-gray-700 dark:text-gray-300"></div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white dark:bg-black border-b border-gray-200 dark:border-gray-800 fixed top-0 z-50 w-full">
        <nav class="flex justify-between items-center h-20 px-8 max-w-7xl mx-auto w-full">
            <div class="flex items-center gap-12">
                <a href="home.html" class="text-2xl font-bold tracking-tighter text-black dark:text-white">MODA PERÚ</a>
                <div class="hidden md:flex gap-8 items-center">
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="home.html">Colección</a>
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="novedades.html">Novedades</a>
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="hombre.html">Hombre</a>
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="mujer.html">Mujer</a>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div id="userMenu" class="hidden flex items-center gap-4">
                    <span id="userEmail" class="text-xs text-gray-500 dark:text-gray-400"></span>
                    <button onclick="logout()" class="text-xs text-gray-400 dark:text-gray-500 hover:text-black dark:hover:text-white">Cerrar</button>
                </div>
                <button id="loginBtn" class="icon-btn dark:text-white" onclick="goToLogin()">
                    <span class="material-symbols-outlined" data-icon="person">person</span>
                </button>
                <button class="icon-btn relative dark:text-white" onclick="goToCart()">
                    <span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
                    <span id="cartBadge" class="absolute -top-1 -right-1 bg-black dark:bg-white text-white dark:text-black text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
                </button>
                <button class="icon-btn dark:text-white" onclick="toggleDarkMode()">
                    <span id="themeIcon" class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="pt-32 pb-20 max-w-7xl mx-auto px-8">
        <div class="max-w-2xl mx-auto">
            <h1 class="headline-lg text-black dark:text-white mb-8">Mi Perfil</h1>

            <!-- User Info Card -->
            <div class="bg-gray-50 dark:bg-gray-900 rounded-lg p-8 mb-8">
                <div class="flex items-center gap-6 mb-6">
                    <div class="w-20 h-20 bg-black dark:bg-white rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-white dark:text-black text-3xl">person</span>
                    </div>
                    <div>
                        <h2 id="profileName" class="text-xl font-semibold text-black dark:text-white">Usuario</h2>
                        <p id="profileEmail" class="text-sm text-gray-500 dark:text-gray-400">email@ejemplo.com</p>
                    </div>
                </div>

                <div class="border-t border-gray-200 dark:border-gray-700 pt-6">
                    <h3 class="label-caps text-gray-500 dark:text-gray-400 uppercase mb-4">Información Personal</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Nombre completo</label>
                            <p id="displayName" class="text-black dark:text-white">-</p>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Correo electrónico</label>
                            <p id="displayEmail" class="text-black dark:text-white">-</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <button onclick="goToCart()" class="p-6 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors text-left">
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-gray-600 dark:text-gray-400">shopping_bag</span>
                        <div>
                            <h3 class="font-semibold text-black dark:text-white">Mis Pedidos</h3>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Ver historial de compras</p>
                        </div>
                    </div>
                </button>
                <button class="p-6 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors text-left">
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-gray-600 dark:text-gray-400">favorite</span>
                        <div>
                            <h3 class="font-semibold text-black dark:text-white">Lista de Deseos</h3>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Productos guardados</p>
                        </div>
                    </div>
                </button>
                <button class="p-6 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors text-left">
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-gray-600 dark:text-gray-400">location_on</span>
                        <div>
                            <h3 class="font-semibold text-black dark:text-white">Direcciones</h3>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Gestionar envíos</p>
                        </div>
                    </div>
                </button>
                <button class="p-6 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors text-left">
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-gray-600 dark:text-gray-400">settings</span>
                        <div>
                            <h3 class="font-semibold text-black dark:text-white">Configuración</h3>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Preferencias de cuenta</p>
                        </div>
                    </div>
                </button>
            </div>

            <!-- Current Cart -->
            <div class="bg-gray-50 dark:bg-gray-900 rounded-lg p-6">
                <h2 class="headline-lg text-black dark:text-white mb-4">Tu Carrito Actual</h2>
                <div id="cartSummary">
                    <p class="text-gray-500 dark:text-gray-400">Cargando...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white dark:bg-black border-t border-gray-200 dark:border-gray-800 w-full mt-20">
        <div class="flex flex-col md:flex-row justify-between items-center py-12 px-8 max-w-7xl mx-auto gap-6">
            <div class="text-lg font-black text-black dark:text-white uppercase">MODA PERÚ</div>
            <div class="flex flex-wrap justify-center gap-6">
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('sostenibilidad')">Sostenibilidad</a>
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('terminos')">Términos</a>
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('envios')">Envíos</a>
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('devoluciones')">Devoluciones</a>
                <a class="footer-link text-gray-600 dark:text-gray-400 cursor-pointer" onclick="showModal('tallas')">Guía de Tallas</a>
            </div>
            <div class="text-[10px] tracking-widest uppercase text-gray-500 dark:text-gray-500">© 2024 MODA PERÚ. LIMA, PERÚ.</div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script type="module">
        import { supabase } from './supabase-config.js';
        // Theme Management
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.textContent = 'dark_mode';
                localStorage.setItem('modaPeruTheme', 'light');
            } else {
                html.classList.add('dark');
                if (icon) icon.textContent = 'light_mode';
                icon.textContent = 'light_mode';
                localStorage.setItem('modaPeruTheme', 'dark');
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem('modaPeruTheme') || 'light';
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                html.classList.add('dark');
                if (icon) icon.textContent = 'light_mode';
            }
        }
        window.toggleDarkMode = toggleDarkMode;
        window.loadTheme = loadTheme;

        // User Management
        async function getCurrentUser() {
            const { data: { user } } = await supabase.auth.getUser();
            return user;
        }
        window.getCurrentUser = getCurrentUser;

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }
        window.logout = logout;

        async function updateUserMenu() {
            const user = await getCurrentUser();
            const userMenu = document.getElementById('userMenu');
            const loginBtn = document.getElementById('loginBtn');
            if (user) {
                userMenu.classList.remove('hidden');
                loginBtn.classList.add('hidden');
                document.getElementById('userEmail').textContent = user.email;

                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('full_name')
                    .eq('id', user.id)
                    .single();

                if (!profileError && profile) {
                    document.getElementById('profileName').textContent = profile.full_name || 'Usuario';
                    document.getElementById('displayName').textContent = profile.full_name || user.email.split('@')[0];
                } else {
                    document.getElementById('profileName').textContent = 'Usuario';
                    document.getElementById('displayName').textContent = user.email.split('@')[0];
                }
                document.getElementById('profileEmail').textContent = user.email;
                document.getElementById('displayEmail').textContent = user.email;
            } else {
                userMenu.classList.add('hidden');
                loginBtn.classList.remove('hidden');
                window.location.href = 'index.html';
            }
        }
        window.updateUserMenu = updateUserMenu;

        // Cart Management
        async function updateCartBadge() {
            const user = await getCurrentUser();
            if (!user) {
                const badge = document.getElementById('cartBadge');
                if (badge) badge.classList.add('hidden');
                return;
            }
            
            const { count, error } = await supabase.from('cart_items').select('*', { count: 'exact', head: true }).eq('user_id', user.id);
            const badge = document.getElementById('cartBadge');
            if (badge) {
                if (!error && count > 0) {
                    badge.textContent = count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }
        window.updateCartBadge = updateCartBadge;

        async function updateCartSummary() {
            const user = await getCurrentUser();
            const container = document.getElementById('cartSummary');
            if (!user) {
                container.innerHTML = '<p class="text-gray-500 dark:text-gray-400">Tu carrito está vacío</p>';
                return;
            }

            const { data: cartItems, error } = await supabase
                .from('cart_items')
                .select(`
                    id,
                    quantity,
                    size,
                    products (
                        name,
                        price
                    )
                `)
                .eq('user_id', user.id);

            if (error || !cartItems || cartItems.length === 0) {
                container.innerHTML = '<p class="text-gray-500 dark:text-gray-400">Tu carrito está vacío</p>';
                return;
            }

            const total = cartItems.reduce((sum, item) => sum + (item.products.price * item.quantity), 0);
            container.innerHTML = `
                <div class="space-y-3">
                    ${cartItems.map((item) => `
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="font-medium text-black dark:text-white">${item.products.name}</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">Talla: ${item.size} • Cantidad: ${item.quantity}</p>
                            </div>
                            <p class="font-semibold text-black dark:text-white">S/ ${(item.products.price * item.quantity).toLocaleString()}</p>
                        </div>
                    `).join('')}
                    <div class="border-t border-gray-200 dark:border-gray-700 pt-3 flex justify-between items-center">
                        <span class="font-semibold text-black dark:text-white">Total</span>
                        <span class="font-bold text-lg text-black dark:text-white">S/ ${total.toLocaleString()}</span>
                    </div>
                    <button onclick="goToCart()" class="btn-primary w-full mt-4">Ver Carrito</button>
                </div>
            `;
        }
        window.updateCartSummary = updateCartSummary;

        function goToCart() { window.location.href = 'cart.html'; }
        window.goToCart = goToCart;
        async function goToLogin() {
            const user = await getCurrentUser();
            window.location.href = user ? 'profile.html' : 'index.html';
        }
        window.goToLogin = goToLogin;

        // Modal
        const modalData = {
            sostenibilidad: {
                title: 'Sostenibilidad',
                content: `<p>MODA PERÚ está comprometido con la sostenibilidad y el comercio ético.</p>
                <h3 class="font-bold text-black dark:text-white mt-4">Nuestra Compromisión</h3>
                <ul class="list-disc pl-5 space-y-2 mt-2">
                    <li>Fibras 100% naturales y renovables</li>
                    <li>Comunidades artesanas del sur del Perú</li>
                    <li>Proceso de producción sostenible</li>
                    <li>Embalajes reciclados</li>
                    <li>Reducción de huella de carbono</li>
                </ul>
                <p class="mt-4">Cada compra apoya a más de 500 familias artesanas.</p>`
            },
            terminos: {
                title: 'Términos y Condiciones',
                content: `<h3 class="font-bold text-black dark:text-white">1. General</h3>
                <p class="mt-2">MODA PERÚ es una tienda online de moda que opera desde Lima, Perú.</p>
                <h3 class="font-bold text-black dark:text-white mt-4">2. Precios</h3>
                <p class="mt-2">Todos los precios incluyen IGV (18%). Nos reservamos el derecho de modificar precios sin previo aviso.</p>
                <h3 class="font-bold text-black dark:text-white mt-4">3. Stock</h3>
                <p class="mt-2">Los productos están sujetos a disponibilidad. Si un producto no está disponible, te contactaremos para un reembolso.</p>
                <h3 class="font-bold text-black dark:text-white mt-4">4. Garantía</h3>
                <p class="mt-2">Todos nuestros productos tienen garantía de calidad por 6 meses.</p>`
            },
            envios: {
                title: 'Envíos',
                content: `<h3 class="font-bold text-black dark:text-white">Métodos de Envío</h3>
                <ul class="list-disc pl-5 space-y-2 mt-2">
                    <li><strong>Lima:</strong> 24-48 horas - S/ 15</li>
                    <li><strong>Provincias:</strong> 3-5 días - S/ 25</li>
                    <li><strong>Gratis:</strong> Pedidos mayores a S/ 500</li>
                </ul>
                <h3 class="font-bold text-black dark:text-white mt-4">Información Importante</h3>
                <p class="mt-2">Los envíos se procesan de lunes a viernes. Pedidos viernes después de 2pm se envían lunes.</p>`
            },
            devoluciones: {
                title: 'Devoluciones',
                content: `<h3 class="font-bold text-black dark:text-white">Política de Devoluciones</h3>
                <ul class="list-disc pl-5 space-y-2 mt-2">
                    <li>Tienes 30 días para solicitar un cambio</li>
                    <li>El producto debe estar sin usar</li>
                    <li>Debe tener las etiquetas originales</li>
                    <li>El cliente paga el envío de retorno</li>
                </ul>
                <h3 class="font-bold text-black dark:text-white mt-4">Proceso</h3>
                <p class="mt-2">Contáctanos por WhatsApp o email para iniciar el proceso.</p>`
            },
            tallas: {
                title: 'Guía de Tallas',
                content: `<h3 class="font-bold text-black dark:text-white">Tabla de Tallas</h3>
                <table class="w-full mt-4 border-collapse">
                    <thead>
                        <tr class="border-b border-gray-300 dark:border-gray-700">
                            <th class="text-left py-2 text-black dark:text-white">Talla</th>
                            <th class="text-left py-2 text-black dark:text-white">Medida</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">XS</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 80-86cm</td>
                        </tr>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">S</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 86-92cm</td>
                        </tr>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">M</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 92-98cm</td>
                        </tr>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">L</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 98-104cm</td>
                        </tr>
                        <tr class="border-b border-gray-200 dark:border-gray-800">
                            <td class="py-2 text-gray-700 dark:text-gray-300">XL</td>
                            <td class="py-2 text-gray-700 dark:text-gray-300">Pecho: 104-110cm</td>
                        </tr>
                    </tbody>
                </table>
                <p class="mt-4 text-gray-600 dark:text-gray-400">¿Necesitas ayuda? Contáctanos por WhatsApp.</p>`
            }
        };

        function showModal(page) {
            const modalDataPage = modalData[page];
            if (modalDataPage) {
                document.getElementById('modalTitle').textContent = modalDataPage.title;
                document.getElementById('modalContent').innerHTML = modalDataPage.content;
                document.getElementById('infoModal').classList.remove('hidden');
            }
        }
        window.showModal = showModal;

        function closeModal() {
            document.getElementById('infoModal').classList.add('hidden');
        }
        window.closeModal = closeModal;

        // Toast notifications
        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        window.showToast = showToast;

        window.onload = async function() {
            loadTheme();
            await updateUserMenu();
            await updateCartBadge();
            await updateCartSummary();
        };
    </script>
</body>
</html>
