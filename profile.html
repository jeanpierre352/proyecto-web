<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODA PERÚ - Mi Perfil</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇵🇪</text></svg>">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        "label-caps": ["Calibri", "sans-serif"],
                        "headline-md": ["Calibri", "sans-serif"],
                        "body-lg": ["Calibri", "sans-serif"],
                        "headline-lg": ["Calibri", "sans-serif"],
                        "body-md": ["Calibri", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="font-body-md text-gray-900 dark:text-gray-100 bg-white dark:bg-black transition-colors duration-300">
    <header class="bg-white dark:bg-black border-b border-gray-200 dark:border-gray-800 fixed top-0 z-50 w-full">
        <nav class="flex justify-between items-center h-20 px-8 max-w-7xl mx-auto w-full">
            <div class="flex items-center gap-12">
                <a href="home.html" class="text-2xl font-bold tracking-tighter text-black dark:text-white">MODA PERÚ</a>
                <div class="hidden md:flex gap-8 items-center">
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="home.html">Colección</a>
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="novedades.html">Novedades</a>
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="product.html">Hombre</a>
                    <a class="nav-link text-gray-600 dark:text-gray-400" href="mujer.html">Mujer</a>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <button class="icon-btn dark:text-white">
                    <span class="material-symbols-outlined">search</span>
                </button>
                <div id="userMenu" class="flex items-center gap-4">
                    <span id="userEmail" class="text-xs text-gray-500 dark:text-gray-400"></span>
                    <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500">Cerrar</button>
                </div>
                <button class="icon-btn relative dark:text-white" onclick="window.location.href='cart.html'">
                    <span class="material-symbols-outlined">shopping_bag</span>
                </button>
                <button class="icon-btn dark:text-white" onclick="toggleDarkMode()">
                    <span id="themeIcon" class="material-symbols-outlined">dark_mode</span>
                </button>
            </div>
        </nav>
    </header>

    <main class="pt-28 pb-20 max-w-7xl mx-auto px-8">
        <div class="flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-64">
                <div class="bg-gray-50 dark:bg-gray-900 p-6">
                    <div class="w-20 h-20 bg-gray-200 dark:bg-gray-700 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="material-symbols-outlined text-4xl">person</span>
                    </div>
                    <h3 id="profileName" class="text-center font-semibold text-black dark:text-white">Usuario</h3>
                    <p id="profileEmail" class="text-center text-sm text-gray-500">correo@ejemplo.com</p>
                </div>
                <div class="mt-4 space-y-2">
                    <button class="w-full text-left p-3 bg-black dark:bg-white text-white dark:text-black">
                        Mis Pedidos
                    </button>
                    <button class="w-full text-left p-3 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-900">
                        Lista de Deseos
                    </button>
                    <button class="w-full text-left p-3 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-900">
                        Direcciones
                    </button>
                    <button onclick="logout()" class="w-full text-left p-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">
                        Cerrar Sesión
                    </button>
                </div>
            </div>
            
            <div class="flex-1">
                <h2 class="headline-lg text-black dark:text-white mb-6">Mis Pedidos</h2>
                <div class="border border-gray-200 dark:border-gray-700 p-6">
                    <p class="text-gray-500 dark:text-gray-400">No tienes pedidos todavía.</p>
                    <a href="home.html" class="btn-primary inline-block mt-4 max-w-xs text-center">Empezar a Comprar</a>
                </div>
                
                <h2 class="headline-lg text-black dark:text-white mt-12 mb-6">Datos de Cuenta</h2>
                <form class="space-y-4 max-w-md">
                    <div>
                        <label class="block label-caps text-gray-500 mb-1">Nombre Completo</label>
                        <input type="text" class="form-input" id="editName" placeholder="Tu nombre"/>
                    </div>
                    <div>
                        <label class="block label-caps text-gray-500 mb-1">Correo Electrónico</label>
                        <input type="email" class="form-input" id="editEmail" placeholder="tu@email.com"/>
                    </div>
                    <div>
                        <label class="block label-caps text-gray-500 mb-1">Teléfono</label>
                        <input type="tel" class="form-input" placeholder="999 999 999"/>
                    </div>
                    <button type="submit" class="btn-primary max-w-xs">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-white dark:bg-black border-t border-gray-200 dark:border-gray-800 w-full mt-20">
        <div class="flex flex-col md:flex-row justify-between items-center py-12 px-8 max-w-7xl mx-auto gap-6">
            <div class="text-lg font-black text-black dark:text-white uppercase">MODA PERÚ</div>
            <div class="flex flex-wrap justify-center gap-6">
                <a class="footer-link cursor-pointer">Sostenibilidad</a>
                <a class="footer-link cursor-pointer">Términos</a>
                <a class="footer-link cursor-pointer">Envíos</a>
                <a class="footer-link cursor-pointer">Devoluciones</a>
            </div>
            <div class="text-[10px] tracking-widest uppercase text-gray-500">© 2024 MODA PERÚ. LIMA, PERÚ.</div>
        </div>
    </footer>

    <script>
        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('modaPeruCurrentUser') || 'null');
        }
        
        function logout() {
            localStorage.removeItem('modaPeruCurrentUser');
            window.location.href = 'index.html';
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.textContent = 'dark_mode';
                localStorage.setItem('modaPeruTheme', 'light');
            } else {
                html.classList.add('dark');
                icon.textContent = 'light_mode';
                localStorage.setItem('modaPeruTheme', 'dark');
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem('modaPeruTheme') || 'light';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                const icon = document.getElementById('themeIcon');
                if (icon) icon.textContent = 'light_mode';
            }
        }

        window.onload = function() {
            loadTheme();
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('profileName').textContent = user.name || 'Usuario';
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('userEmail').textContent = user.name || user.email;
            if (document.getElementById('editName')) document.getElementById('editName').value = user.name || '';
            if (document.getElementById('editEmail')) document.getElementById('editEmail').value = user.email || '';
        };
    </script>
</body>
</html>
